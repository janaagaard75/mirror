name: Mirror
options:
  bundleIdPrefix: net.aagaard
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

targets:
  Mirror:
    type: application
    platform: iOS
    sources:
      - path: Mirror
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.aagaard.mirror
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: 6UXZ93SX6E
        CODE_SIGN_IDENTITY: "iPhone Developer"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Mirror"
        INFOPLIST_KEY_NSCameraUsageDescription: "To use the screen as a mirror."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIStatusBarHidden: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
